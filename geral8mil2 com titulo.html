<!DOCTYPE html>
<html>
<head>
	<title>Geração de Cartela de Bingo</title>
	<style>
		body {
			zoom: 100%;
		}
		
		.container {
			width: 100%;
			margin: 0 auto;
			padding: 0;
			border: none;
			border-radius: 0;
			box-shadow: none;
			font-size: 10px;
		}
		
		.cartela {
			width: 100%;
			margin: 0 auto;
			padding: 0;
			border: 1px solid #ccc;
			border-radius: 10px;
			box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
		}
		
		.cartela table {
			width: 100%;
			border-collapse: collapse;
		}
		
		.cartela th {
			background-color: #f0f0f0;
			padding: 5px;
			border: 1px solid #ccc;
			text-align: center;
			vertical-align: middle;
			font-size: 10px;
		}
		
		.cartela td {
			padding: 5px;
			border: 1px solid #ccc;
			text-align: center;
			vertical-align: middle;
			font-size: 10px;
		}
		
		.cartela td.numero {
			font-size: 20px; /* Aumentei a fonte para 20px */
		}
		
		.titulo-cartela {
			font-size: 14px;
			font-weight: bold;
			text-align: center;
			margin-bottom: 10px;
		}
		
		.botao-imprimir {
			background-color: #4CAF50;
			color: #fff;
			padding: 10px 20px;
			border: none;
			border-radius: 10px;
			cursor: pointer;
			position: fixed;
			bottom: 20px;
			right: 20px;
			font-size: 10px;
		}
		
		.botao-imprimir:hover {
			background-color: #3e8e41;
		}
	</style>
</head>
<body>
	<div class="container">
		<div class="cartela">
			<table>
				<tbody id="cartela-body">
				</tbody>
			</table>
		</div>
	</div>
	
	<button class="botao-imprimir" onclick="window.print()">Imprimir Cartela</button>
	
	<script>
		let numerosGerados = [];
		let linhas = 2500; /* Aumentei para 4000 */
		let colunas = 4;
		
		function gerarNumerosAleatorios() {
			for (let i = 0; i < linhas; i++) {
				let linhaNumeros = [];
				while (linhaNumeros.length < colunas) {
					let numero = Math.floor(Math.random() * 10000);
					if (!linhaNumeros.includes(numero) && !numerosGerados.includes(numero)) {
						linhaNumeros.push(numero);
					}
				}
				numerosGerados = numerosGerados.concat(linhaNumeros);
			}
			let cartelaBody = document.getElementById('cartela-body');
			for (let i = 0; i < linhas; i++) {
				let titulo = document.createElement('tr');
				let celulaTitulo = document.createElement('td');
				celulaTitulo.colSpan = 4;
				celulaTitulo.innerHTML = '<div class="titulo-cartela">##### B I C H O BINGO#### - R$ 700,00 (Setecentos Reais)</div>';
				titulo.appendChild(celulaTitulo);
				cartelaBody.appendChild(titulo);
				
				let cabecalho = document.createElement('tr');
				let celulaCabecalho1 = document.createElement('th');
				celulaCabecalho1.innerText = 'Número 1';
				cabecalho.appendChild(celulaCabecalho1);
				let celulaCabecalho2 = document.createElement('th');
				celulaCabecalho2.innerText = 'Número 2';
				cabecalho.appendChild(celulaCabecalho2);
				let celulaCabecalho3 = document.createElement('th');
				celulaCabecalho3.innerText = 'Número 3';
				cabecalho.appendChild(celulaCabecalho3);
				let celulaCabecalho4 = document.createElement('th');
				celulaCabecalho4.innerText = 'Número 4';
				cabecalho.appendChild(celulaCabecalho4);
				cartelaBody.appendChild(cabecalho);
				let linha = document.createElement('tr');
				for (let j = 0; j < colunas; j++) {
					let celula = document.createElement('td');
					celula.className = 'numero'; /* Adicionei a classe 'numero' */
					celula.innerText = numerosGerados[i * colunas + j];
					linha.appendChild(celula);
				}
				cartelaBody.appendChild(linha);
			}
		}
		
		window.onload = function() {
			gerarNumerosAleatorios();
		};
	</script>
</body>
</html>
