<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roleta Giratória</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        .roleta-container {
            position: relative;
            width: 400px; /* Dobrado de 300px para 600px */
            height: 400px; /* Dobrado de 300px para 600px */
        }
        .roleta {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 3s ease-out;
        }
        .ponteiro {
            position: absolute;
            top: -20px; /* Ajustado para acompanhar o tamanho */
            left: 50%;
            transform: translateX(-50%);
            width: 40px;  /* Dobrado de 20px para 40px */
            height: 80px; /* Dobrado de 40px para 80px */
            background: red;
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="roleta-container">
        <div class="ponteiro"></div>
        <img src="roleta.jpeg" class="roleta" id="roleta">
    </div>
    <button onclick="girarRoleta()">Girar</button>
    <script>
        function girarRoleta() {
            const roleta = document.getElementById("roleta");
            let graus = Math.floor(Math.random() * 360) + 3600;
            roleta.style.transform = `rotate(${graus}deg)`;
        }
    </script>
</body>
</html>
