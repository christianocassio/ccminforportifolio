<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Empresa Interessada</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        
        h1 {
            text-align: center;
        }
        
        .formulario {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .label {
            display: block;
            margin-bottom: 10px;
        }
        
        .input {
            width: 100%;
            height: 40px;
            margin-bottom: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        .botao {
            width: 100%;
            height: 40px;
            background-color: #4CAF50;
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .botao:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <h1>Cadastro de Empresa Interessada</h1>
    <div class="formulario">
        <form id="formulario">
            <label class="label" for="nome_empresa">Nome da Empresa:</label>
            <input class="input" type="text" id="nome_empresa" name="nome_empresa">
            
            <label class="label" for="contato">Contato:</label>
            <input class="input" type="text" id="contato" name="contato">
            
            <label class="label" for="telefone">Telefone:</label>
            <input class="input" type="text" id="telefone" name="telefone">
            
            <label class="label" for="email">E-mail:</label>
            <input class="input" type="email" id="email" name="email">
            
            <button class="botao" type="submit">Enviar Cadastro para Christiano</button>
        </form>
    </div>
    
    <script>
        document.getElementById("formulario").addEventListener("submit", function(event) {
            event.preventDefault();
            
            var nomeEmpresa = document.getElementById("nome_empresa").value;
            var contato = document.getElementById("contato").value;
            var telefone = document.getElementById("telefone").value;
            var email = document.getElementById("email").value;
            
            var corpoEmail = "Nome da Empresa:   " + nomeEmpresa + "\n Contato:   " + contato + "\n Telefone:  " + telefone + "\n E-mail:   " + email;
            
            var subject = "Cadastro de Empresa Interessada-->"  + nomeEmpresa;
            var to = "chriscassiomiranda@gmail.com";
            
            window.location.href = "mailto:" + to + "?subject=" + subject + "&body=" + corpoEmail;
        });
    </script>
</body>
</html>
