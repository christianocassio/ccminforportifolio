<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

    <h1>Bem-vindo ao nosso site!</h1>
    <p>
        Número de visitas (neste navegador): 
        <span id="visitor-count">Carregando...</span>
    </p>

    <script>
        // Função para atualizar o contador
        function updateVisitorCount() {
            let count = localStorage.getItem('pageVisits'); // Tenta pegar o contador do armazenamento local

            if (count) {
                // Se existe, converte para número e incrementa
                count = parseInt(count) + 1;
            } else {
                // Se não existe (primeira visita neste navegador), começa em 1
                count = 1;
            }

            // Salva o novo valor no armazenamento local
            localStorage.setItem('pageVisits', count);

            // Exibe o valor na página
            document.getElementById('visitor-count').textContent = count;
        }

        // Chama a função quando a página carrega
        window.onload = updateVisitorCount; 
    </script>

</body>
</html>
